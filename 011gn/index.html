<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>011GN — the design thinking system</title>
<meta name="description" content="011GN is the design thinking system behind Green Neurons." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#e9e7e2;
    --ink:#26261f;
    --ink-mid:#5a584f;
    --line:#9c988d;
    --accent:#3d5a80;
    --sans:'DM Sans','Helvetica Neue',sans-serif;
    --mono:'DM Mono','Courier New',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    overflow:hidden;
  }
  canvas#art{
    position:fixed; inset:0;
    width:100%; height:100%;
    display:block;
  }
  main{
    position:relative; z-index:2;
    min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding:24px;
    opacity:0;
    animation:fadeIn 1.2s ease 0.3s forwards;
  }
  .top-block{ display:flex; flex-direction:column; align-items:center; margin-bottom:6vh; transform:translateY(2vh); }
  .bottom-block{ display:flex; flex-direction:column; align-items:center; gap:16px; margin-top:32vh; }
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--ink-mid);
    margin-bottom:20px;
  }
  .eyebrow::before{ content:'— '; color:var(--accent); }
  h1{
    font-family:var(--sans);
    font-weight:700;
    font-size:clamp(2.6rem,8vw,4.8rem);
    letter-spacing:0.11em;
    word-spacing:0.138em;
    color:var(--ink);
    line-height:0.95;
  }
  .tagline{
    font-family:var(--mono);
    font-size:12px;
    font-weight:500;
    letter-spacing:0.24em;
    text-transform:lowercase;
    color:#413f36;
  }
  .door{
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .progress-track{
    width:200px; height:1px;
    background:rgba(38,38,31,0.15);
    position:relative;
    overflow:hidden;
  }
  .progress-fill{
    position:absolute; left:0; top:0; bottom:0;
    width:0%;
    background:var(--ink);
  }
  .enter-now{
    font-family:var(--sans);
    font-size:11px;
    font-weight:500;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--ink);
    text-decoration:none;
    border-bottom:1px solid rgba(38,38,31,0.3);
    padding-bottom:3px;
    transition:color 0.2s, border-color 0.2s;
  }
  .enter-now:hover{ color:var(--accent); border-color:var(--accent); }

  @keyframes fadeIn{ to{ opacity:1; } }

  @media (max-width:600px){
    .progress-track{ width:150px; }
  }
</style>
</head>
<body>

<canvas id="art"></canvas>

<main>
  <div class="top-block">
    <p class="eyebrow">011GN</p>
    <h1>the design<br>thinking system</h1>
  </div>

  <div class="bottom-block">
    <p class="tagline">a green neurons construct</p>
    <div class="door">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <a class="enter-now" href="https://greenneurons.us/" id="enterNow">Enter now &rarr;</a>
  </div>
</main>

<script>
/* ============================================================
   011GN — SECRET DOOR
   Architectural wireframe: two icosahedra, hand-drafted in
   hatch and line, counter-rotating and offset so their facets
   interfere where they overlap — the moiré reads as a drafted
   structural study, not a firework.
   ============================================================ */
(function(){
  const canvas = document.getElementById('art');
  const ctx = canvas.getContext('2d');
  let w, h, dpr;

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = window.innerWidth; h = window.innerHeight;
    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- Icosahedron geometry ----
  const PHI = 1.6180339887498949;
  const VERTS = [
    [-1, PHI, 0], [1, PHI, 0], [-1, -PHI, 0], [1, -PHI, 0],
    [0, -1, PHI], [0, 1, PHI], [0, -1, -PHI], [0, 1, -PHI],
    [PHI, 0, -1], [PHI, 0, 1], [-PHI, 0, -1], [-PHI, 0, 1]
  ];
  const FACES = [
    [0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],
    [1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
    [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],
    [4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1]
  ];
  // normalize verts to unit sphere
  const UNIT = VERTS.map(v=>{
    const len = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]);
    return [v[0]/len, v[1]/len, v[2]/len];
  });

  function rotate(v, ax, ay){
    let [x,y,z] = v;
    // rotate around Y
    let x1 = x*Math.cos(ay) + z*Math.sin(ay);
    let z1 = -x*Math.sin(ay) + z*Math.cos(ay);
    // rotate around X
    let y2 = y*Math.cos(ax) - z1*Math.sin(ax);
    let z2 = y*Math.sin(ax) + z1*Math.cos(ax);
    return [x1, y2, z2];
  }

  function project(v, cx, cy, radius){
    const focal = 3.6;
    const scale = focal / (focal + v[2]);
    return { x: cx + v[0]*radius*scale, y: cy + v[1]*radius*scale };
  }

  function hatchFace(p0,p1,p2, angle, spacing, hatchAlpha, edgeAlpha){
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.closePath();
    ctx.clip();
    const minX = Math.min(p0.x,p1.x,p2.x), maxX = Math.max(p0.x,p1.x,p2.x);
    const minY = Math.min(p0.y,p1.y,p2.y), maxY = Math.max(p0.y,p1.y,p2.y);
    const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
    const diag = Math.hypot(maxX-minX, maxY-minY) + spacing*2;
    const dx = Math.cos(angle), dy = Math.sin(angle);
    const nx = Math.cos(angle+Math.PI/2), ny = Math.sin(angle+Math.PI/2);
    ctx.strokeStyle = '#26261f';
    ctx.globalAlpha = hatchAlpha;
    ctx.lineWidth = 0.5;
    for(let d=-diag; d<diag; d+=spacing){
      const ox = cx + nx*d, oy = cy + ny*d;
      ctx.beginPath();
      ctx.moveTo(ox - dx*diag, oy - dy*diag);
      ctx.lineTo(ox + dx*diag, oy + dy*diag);
      ctx.stroke();
    }
    ctx.restore();

    // crisp edge outline — kept confident even when the hatch wash is faint
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.closePath();
    ctx.strokeStyle = '#26261f';
    ctx.globalAlpha = edgeAlpha;
    ctx.lineWidth = 0.75;
    ctx.stroke();
    ctx.restore();
  }

  function drawStructure(cx, cy, radius, ax, ay, spacing, hatchAlpha, edgeAlpha){
    // rotate + project all verts once
    const pts = UNIT.map(v => project(rotate(v, ax, ay), cx, cy, radius));
    // hatch angle derived from overall rotation so shading direction drifts slowly
    const hatchAngle = ay * 0.6;
    FACES.forEach(f=>{
      hatchFace(pts[f[0]], pts[f[1]], pts[f[2]], hatchAngle, spacing, hatchAlpha, edgeAlpha);
    });
  }

  let t = 0;
  let frameCount = 0;
  function frame(){
    frameCount++;
    if (frameCount % 2 === 0){ // ease CPU load, still smooth
      requestAnimationFrame(frame);
      return;
    }
    t += 0.0026;
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = '#e9e7e2';
    ctx.fillRect(0,0,w,h);

    const cx = w/2, cy = h/2 - h*0.02;
    const radiusBig = Math.min(w,h) * 0.29;

    // moon: small satellite tucked into the big structure's lower-right
    // quadrant, orbiting a local point out there rather than sweeping
    // through the whole form — with a depth factor that pulls it in
    // front of / behind the big form as it loops.
    const orbitCenterX = cx + radiusBig * 0.32;
    const orbitCenterY = cy + radiusBig * 0.30;
    const orbitR = radiusBig * 0.14;
    const orbitAngle = t * 0.5;
    const depth = Math.sin(orbitAngle); // -1 (behind) .. 1 (in front)
    const mx = orbitCenterX + Math.cos(orbitAngle) * orbitR;
    const my = orbitCenterY + Math.sin(orbitAngle) * orbitR * 0.6;
    const radiusMoon = radiusBig * (0.19 + 0.03 * depth);
    const moonHatchAlpha = 0.10 + 0.08 * ((depth + 1) / 2);
    const moonEdgeAlpha  = 0.30 + 0.22 * ((depth + 1) / 2);

    ctx.globalCompositeOperation = 'multiply';
    const drawBig  = () => drawStructure(cx, cy, radiusBig, t*0.4, t, 9, 0.13, 0.38);
    const drawMoon = () => drawStructure(mx, my, radiusMoon, -t*0.8, -t*1.6, 4, moonHatchAlpha, moonEdgeAlpha);

    if (depth >= 0){ drawBig(); drawMoon(); }   // moon in front — drawn on top
    else { drawMoon(); drawBig(); }              // moon behind — big form occludes it
    ctx.globalCompositeOperation = 'source-over';

    requestAnimationFrame(frame);
  }
  frame();
})();

/* ============================================================
   SECRET DOOR TIMER — 15s auto-advance to greenneurons.us,
   with an immediate skip for returning visitors this session.
   Add ?preview to the URL to always see the full intro again
   (handy for design review — bypasses the skip-ahead entirely).
   ============================================================ */
(function(){
  const DEST = 'https://greenneurons.us/';
  const DURATION = 15000;
  const isPreview = new URLSearchParams(window.location.search).has('preview');

  if (!isPreview && sessionStorage.getItem('011gn_entered') === '1') {
    window.location.replace(DEST);
    return;
  }

  const fill = document.getElementById('progressFill');
  const enterNow = document.getElementById('enterNow');
  const start = Date.now();

  function go(){
    if (!isPreview) sessionStorage.setItem('011gn_entered', '1');
    window.location.href = DEST;
  }

  enterNow.addEventListener('click', function(e){
    e.preventDefault();
    go();
  });

  const tick = setInterval(function(){
    const elapsed = Date.now() - start;
    const pct = Math.min(100, (elapsed / DURATION) * 100);
    fill.style.width = pct + '%';
    if (elapsed >= DURATION){
      clearInterval(tick);
      go();
    }
  }, 100);
})();
</script>

</body>
</html>
